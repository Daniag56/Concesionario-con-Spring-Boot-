<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="layout :: layout(~{::section})">

<section>

    <!-- Fuente moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body, .container, .card-modern, h1, h5, p, .value {
            font-family: 'Poppins', sans-serif;
        }

        .dashboard-title {
            font-weight: 700;
            font-size: 2.4rem;
        }

        .card-modern {
            border-radius: 18px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            transition: transform .2s ease, box-shadow .2s ease;
        }

        .card-modern:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 35px rgba(0,0,0,0.12);
        }

        .value {
            font-size: 2.4rem;
            font-weight: 700;
            margin-top: 10px;
        }

        .icon-big {
            font-size: 3.2rem;
        }
    </style>

    <div class="container">

        <h1 class="dashboard-title mb-4">📊 Panel de Control</h1>
        <p class="text-muted mb-5">Resumen general del concesionario</p>

        <div class="row g-4">

            <div class="col-md-4">
                <div class="card-modern text-center">
                    <i class="bi bi-building icon-big text-primary"></i>
                    <h5 class="mt-3">Marcas</h5>
                    <div id="marcas" class="value">0</div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card-modern text-center">
                    <i class="bi bi-car-front icon-big text-success"></i>
                    <h5 class="mt-3">Modelos</h5>
                    <div id="modelos" class="value">0</div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card-modern text-center">
                    <i class="bi bi-shop icon-big text-warning"></i>
                    <h5 class="mt-3">Concesionarios</h5>
                    <div id="concesionarios" class="value">0</div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card-modern text-center">
                    <i class="bi bi-tools icon-big text-danger"></i>
                    <h5 class="mt-3">Extras</h5>
                    <div id="extras" class="value">0</div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card-modern text-center">
                    <i class="bi bi-truck-front icon-big text-info"></i>
                    <h5 class="mt-3">Vehículos</h5>
                    <div id="vehiculos" class="value">0</div>
                </div>
            </div>

        </div>

        <div class="card-modern mt-5 p-4">
            <h4 class="mb-3">Distribución General</h4>
            <canvas id="chartResumen" height="120"></canvas>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        fetch("/api/dashboard/resumen")
            .then(r => r.json())
            .then(data => {

                document.getElementById("marcas").textContent = data.marcas;
                document.getElementById("modelos").textContent = data.modelos;
                document.getElementById("concesionarios").textContent = data.concesionarios;
                document.getElementById("extras").textContent = data.extras;
                document.getElementById("vehiculos").textContent = data.vehiculos;

                new Chart(document.getElementById("chartResumen"), {
                    type: "bar",
                    data: {
                        labels: ["Marcas", "Modelos", "Concesionarios", "Extras", "Vehículos"],
                        datasets: [{
                            label: "Cantidad",
                            data: [
                                data.marcas,
                                data.modelos,
                                data.concesionarios,
                                data.extras,
                                data.vehiculos
                            ],
                            backgroundColor: [
                                "rgba(13,110,253,0.7)",
                                "rgba(25,135,84,0.7)",
                                "rgba(255,193,7,0.7)",
                                "rgba(220,53,69,0.7)",
                                "rgba(13,202,240,0.7)"
                            ],
                            borderRadius: 10
                        }]
                    },
                    options: {
                        plugins: {
                            legend: { display: false }
                        },
                        scales: {
                            y: { beginAtZero: true }
                        }
                    }
                });
            });
    </script>

</section>

</html>
