<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="layout :: layout(~{::section})">

<section>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        .page-wrapper { padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .card {
            width: 580px;
            background: rgba(255,255,255,0.78);
            backdrop-filter: blur(12px);
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.12);
        }
        h2 { font-weight: 700; text-align: center; margin-bottom: 24px; }
        label { font-weight: 600; display: block; margin-bottom: 5px; }
        .form-control {
            border-radius: 8px; padding: 10px 12px; border: 1px solid #ccc;
            font-size: 1rem; width: 100%; box-sizing: border-box; transition: border-color 0.2s;
        }
        .form-control:focus { border-color: #0d6efd; outline: none; box-shadow: 0 0 0 3px rgba(13,110,253,0.15); }
        .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .btn-accion {
            padding: 9px 18px; font-size: 0.95rem; border-radius: 8px; font-weight: 600;
            display: inline-flex; align-items: center; gap: 6px;
            transition: 0.2s ease; text-decoration: none; border: 1.5px solid; cursor: pointer; background: none;
        }
        .btn-accion:hover { transform: translateY(-2px); opacity: 0.9; }
        .btn-guardar { border-color: #198754; color: #198754; }
        .btn-guardar:hover { background: #198754; color: #fff; }
        .btn-cancelar { border-color: #6c757d; color: #6c757d; }
        .btn-cancelar:hover { background: #6c757d; color: #fff; }
        .btn-row { display: flex; justify-content: space-between; margin-top: 24px; }
        .section-label {
            font-size: 0.78rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.06em; color: #6c757d; margin: 20px 0 10px;
        }
    </style>

    <div class="page-wrapper">
        <div class="card">

            <h2 th:text="${titulo}">Formulario Vehículo</h2>

            <form th:action="${accion}" th:object="${vehiculo}" method="post">

                <p class="section-label">Identificación</p>
                <div class="grid2">
                    <div class="mb-3">
                        <label>Código Vehículo</label>
                        <input type="text" th:field="*{codigoVehiculo}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>VIN</label>
                        <input type="text" th:field="*{vin}" class="form-control" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label>Matrícula</label>
                    <input type="text" th:field="*{matricula}" class="form-control">
                </div>

                <p class="section-label">Clasificación</p>
                <div class="grid2">

                    <div class="mb-3">
                        <label>Modelo</label>
                        <select name="modelo.id" class="form-control">
                            <option value="">-- Selecciona --</option>
                            <option th:each="modelo : ${modelos}"
                                    th:value="${modelo.id}"
                                    th:text="${modelo.nombre}">
                            </option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label>Concesionario</label>
                        <select name="concesionario.id" class="form-control">
                            <option value="">-- Selecciona --</option>
                            <option th:each="con : ${concesionarios}"
                                    th:value="${con.id}"
                                    th:text="${con.nombreComercial}">
                            </option>
                        </select>
                    </div>

                </div>

                <div class="grid2">
                    <div class="mb-3">
                        <label>Estado</label>
                        <select th:field="*{estado}" class="form-control">
                            <option value="">-- Selecciona --</option>
                            <option value="NUEVO">Nuevo</option>
                            <option value="KM0">Km0</option>
                            <option value="USADO">Usado</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label>Combustible</label>
                        <select th:field="*{combustible}" class="form-control">
                            <option value="">-- Selecciona --</option>
                            <option value="GASOLINA">Gasolina</option>
                            <option value="DIESEL">Diésel</option>
                            <option value="HIBRIDO">Híbrido</option>
                            <option value="ELECTRICO">Eléctrico</option>
                            <option value="GPL">GPL</option>
                            <option value="GNC">GNC</option>
                        </select>
                    </div>
                </div>

                <p class="section-label">Detalles</p>
                <div class="grid2">
                    <div class="mb-3">
                        <label>Fecha de Fabricación</label>
                        <input type="date" th:field="*{fechaFabricacion}" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label>Kilometraje</label>
                        <input type="number" th:field="*{kilometraje}" class="form-control">
                    </div>
                </div>

                <div class="grid2">
                    <div class="mb-3">
                        <label>Color</label>
                        <input type="text" th:field="*{color}" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label>Precio de Venta (€)</label>
                        <input type="number" step="0.01" th:field="*{precioVenta}" class="form-control">
                    </div>
                </div>

                <p class="section-label">Extras incluidos</p>
                <div class="mb-3">
                    <div th:each="e : ${extras}" style="margin-bottom: 6px;">
                        <label style="font-weight: 400; display: flex; align-items: center; gap: 8px; cursor: pointer;">
                            <input type="checkbox"
                                   th:field="*{extras}"
                                   th:value="${e.id}">
                            <span th:text="${e.nombre + ' (+ ' + e.precioAdicional + ' €)'}"></span>
                        </label>
                    </div>
                </div>

                <div class="btn-row">
                    <button type="submit" class="btn-accion btn-guardar">💾 Guardar</button>
                    <a th:href="@{/vehiculos/lista}" class="btn-accion btn-cancelar">✖ Cancelar</a>
                </div>

            </form>

        </div>
    </div>

</section>
