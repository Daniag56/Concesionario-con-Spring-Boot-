<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="layout :: layout(~{::section})">

<section>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body, html { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        .page-wrapper { padding: 40px; display: flex; flex-direction: column; align-items: center; max-width: 100%; margin: 0 auto; box-sizing: border-box; }
        .card {
            width: 520px;
            max-width: 100%;
            background: rgba(255,255,255,0.78);
            backdrop-filter: blur(12px);
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.12);
        }
        h2 { font-weight: 700; text-align: center; margin-bottom: 24px; }
        label { font-weight: 600; display: block; margin-bottom: 5px; }
        .form-control {
            border-radius: 8px; padding: 10px 12px; border: 1px solid #ccc;
            font-size: 1rem; width: 100%; box-sizing: border-box; transition: border-color 0.2s;
        }
        .form-control:focus { border-color: #0d6efd; outline: none; box-shadow: 0 0 0 3px rgba(13,110,253,0.15); }

        @media (max-width: 576px) {
            .page-wrapper { padding: 20px 15px; }
            .card { padding: 20px; }
            h2 { font-size: 1.4rem; }
        }
        .btn-accion {
            padding: 9px 18px; font-size: 0.95rem; border-radius: 8px; font-weight: 600;
            display: inline-flex; align-items: center; gap: 6px;
            transition: 0.2s ease; text-decoration: none; border: 1.5px solid; cursor: pointer; background: none;
        }
        .btn-accion:hover { transform: translateY(-2px); opacity: 0.9; }
        .btn-guardar { border-color: #198754; color: #198754; }
        .btn-guardar:hover { background: #198754; color: #fff; }
        .btn-cancelar { border-color: #6c757d; color: #6c757d; }
        .btn-cancelar:hover { background: #6c757d; color: #fff; }
        .btn-row { display: flex; justify-content: space-between; margin-top: 24px; }
    </style>

    <div class="page-wrapper">
        <div class="card">

            <h2 th:text="${titulo}">Formulario Concesionario</h2>

            <form th:action="${accion}" th:object="${concesionario}" method="post">

                <div class="mb-3">
                    <label>Nombre Comercial</label>
                    <input type="text" th:field="*{nombreComercial}" class="form-control" placeholder="Ej: AutoSur Málaga" required>
                </div>

                <div class="mb-3">
                    <label>Ciudad</label>
                    <input type="text" th:field="*{ciudad}" class="form-control" placeholder="Ej: Málaga" required>
                </div>

                <div class="mb-3">
                    <label>Dirección</label>
                    <input type="text" th:field="*{direccion}" class="form-control" placeholder="Ej: Av. Principal 123" required>
                </div>

                <div class="mb-3">
                    <label>Plazas de Exposición</label>
                    <input type="number" th:field="*{plazasExposicion}" class="form-control" placeholder="Ej: 20">
                </div>

                <div class="mb-3">
                    <label>Metros Cuadrados</label>
                    <input type="number" th:field="*{metrosCuadrados}" class="form-control" placeholder="Ej: 500">
                </div>

                <div class="btn-row">
                    <button type="submit" class="btn-accion btn-guardar">💾 Guardar</button>
                    <a href="/concesionarios/lista" class="btn-accion btn-cancelar">✖ Cancelar</a>
                </div>

            </form>

        </div>
    </div>

</section>
</html>
