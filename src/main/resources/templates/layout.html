<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${titulo} ?: 'Concesionario'">Concesionario</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body { background: #f5f6fa; }
        .navbar-brand { font-weight: 700; }
        .content { padding: 30px; }
        .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-weight: 500; }
        .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }

        .user-menu {
            position: relative;
        }

        .user-dropdown-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.4) 0%, rgba(118, 75, 162, 0.4) 100%);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: #fff;
            padding: 8px 16px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            font-weight: 500;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
        }

        .user-dropdown-btn:hover {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.6) 0%, rgba(118, 75, 162, 0.6) 100%);
            border-color: rgba(255, 255, 255, 0.6);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.5);
            transform: translateY(-1px);
        }

        .user-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
        }

        .user-name {
            max-width: 120px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-caret {
            transition: transform 0.3s ease;
            font-size: 0.75rem;
        }

        .user-dropdown-btn[aria-expanded="true"] .user-caret {
            transform: rotate(180deg);
        }

        .user-dropdown-menu {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 8px;
            min-width: 200px;
            background: rgba(255, 255, 255, 0.98) !important;
            backdrop-filter: blur(20px);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            border: none !important;
            padding: 0 !important;
            overflow: hidden;
        }

        .user-dropdown-menu .dropdown-header {
            padding: 16px 16px 12px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
        }

        .dropdown-header-text {
            font-size: 0.75rem;
            color: #6c757d;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        .dropdown-header-email {
            font-weight: 600;
            color: #212529;
            font-size: 0.9rem;
        }

        .user-dropdown-menu .dropdown-item {
            padding: 12px 16px;
            color: #495057;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s ease;
            border: none;
            background: none;
            width: 100%;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .user-dropdown-menu .dropdown-item:hover {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.08) 0%, rgba(118, 75, 162, 0.08) 100%);
            color: #667eea;
        }

        .user-dropdown-menu .dropdown-item i {
            width: 18px;
            text-align: center;
        }

        .user-dropdown-menu .dropdown-divider {
            margin: 0;
            border: none;
            border-top: 1px solid rgba(0, 0, 0, 0.08);
        }

        .user-dropdown-menu .logout-item {
            color: #dc3545;
        }

        .user-dropdown-menu .logout-item:hover {
            background: rgba(220, 53, 69, 0.08);
            color: #dc3545;
        }

        @media (max-width: 768px) {
            .user-name {
                max-width: 80px;
            }
            .user-dropdown-menu {
                right: -10px;
                min-width: 180px;
            }
        }

        @media (max-width: 576px) {
            .user-dropdown-btn {
                padding: 6px 10px;
            }
            .user-name {
                display: none;
            }
            .user-dropdown-menu {
                right: 0;
                min-width: 160px;
            }
        }

        .user-bar-container {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }

        .user-bar {
            position: relative;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            padding: 8px 16px;
            border-radius: 50px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(102, 126, 234, 0.15);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .user-bar:hover {
            box-shadow: 0 4px 16px rgba(102, 126, 234, 0.15);
            border-color: rgba(102, 126, 234, 0.3);
        }

        .user-bar-avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 0.9rem;
        }

        .user-bar-info {
            display: flex;
            flex-direction: column;
            line-height: 1.2;
        }

        .user-bar-label {
            font-size: 0.65rem;
            color: #6c757d;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .user-bar-email {
            font-size: 0.85rem;
            font-weight: 600;
            color: #212529;
            max-width: 140px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-bar-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 8px;
            min-width: 170px;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
            padding: 8px 0;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .user-bar:hover .user-bar-dropdown,
        .user-bar:focus .user-bar-dropdown {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .user-bar-link {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            color: #495057;
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .user-bar-link:hover {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.08) 0%, rgba(118, 75, 162, 0.08) 100%);
            color: #667eea;
        }

        .user-bar-divider {
            margin: 4px 12px;
            border: none;
            border-top: 1px solid rgba(0, 0, 0, 0.08);
        }

        .user-bar-logout {
            color: #dc3545;
        }

        .user-bar-logout:hover {
            background: rgba(220, 53, 69, 0.08);
            color: #dc3545;
        }

        @media (max-width: 576px) {
            .user-bar-email {
                display: none;
            }
            .user-bar-info {
                display: none;
            }
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/dashboard}">Concesionario</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/dashboard}">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/marcas/lista}">Marcas</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/modelos/lista}">Modelos</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/concesionarios/lista}">Concesionarios</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/extras/lista}">Extras</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/vehiculos/lista}">Vehículos</a></li>
            </ul>
        </div>
    </div>
</nav>


<div class="content container" th:fragment="layout(content)">
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:replace="${content}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
