<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="layout :: layout(~{::section})">

<section>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body, html {
      height: 100%; margin: 0; padding: 0; font-family: 'Poppins', sans-serif;
    }
    .page-wrapper {
      min-height: 100vh; display: flex; justify-content: center; align-items: center;
      padding: 20px; max-width: 100%; margin: 0 auto; box-sizing: border-box;
    }
    .form-card {
      width: 100%; max-width: 1100px; background: rgba(255,255,255,0.78); backdrop-filter: blur(12px);
      padding: 25px 30px; border-radius: 14px; box-shadow: 0 4px 14px rgba(0,0,0,0.12); transition: 0.2s ease;
    }
    .form-card:hover { transform: translateY(-3px); box-shadow: 0 8px 22px rgba(0,0,0,0.18); }
    .form-title { font-size: 1.8rem; font-weight: 700; text-align: center; margin-bottom: 20px; }
    .form-control { border-radius: 8px; padding: 10px 12px; border: 1px solid #ccc; font-size: 1rem; width: 100%; box-sizing: border-box; transition: border-color 0.2s; }
    .form-control:focus { border-color: #0d6efd; outline: none; box-shadow: 0 0 0 3px rgba(13,110,253,0.15); }
    .btn-accion { padding: 9px 18px; font-size: 0.95rem; border-radius: 8px; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; transition: 0.2s ease; text-decoration: none; border: 1.5px solid; cursor: pointer; background: none; }
    .btn-accion:hover { transform: translateY(-2px); opacity: 0.9; }
    .btn-outline-success { border-color: #198754; color: #198754; background: transparent; }
    .btn-outline-success:hover { background: #198754; color: #fff; }
    .btn-outline-danger { border-color: #dc3545; color: #dc3545; background: transparent; }
    .btn-outline-danger:hover { background: #dc3545; color: #fff; }
    .btn-row { display: flex; justify-content: space-between; margin-top: 20px; }
  </style>

  <div class="page-wrapper">
    <div class="form-card">
      <h2 class="form-title" th:text="${titulo}">Formulario</h2>
      <form th:action="${accion}" th:object="${objeto}" method="post">
        <div th:each="campo : ${campos}" class="mb-3">
          <label th:text="${campo.label}"></label>
          <input th:field="*{__${campo.nombre}__}"
                 th:type="${campo.tipo}"
                 class="form-control"
                 th:placeholder="${campo.placeholder}">
        </div>
        <div class="btn-row">
          <button type="submit" class="btn-accion btn-outline-success btn-outline-premium">💾 Guardar</button>
          <a th:href="${volver}" class="btn-accion btn-outline-danger btn-outline-premium">✖ Cancelar</a>
        </div>
      </form>
    </div>
  </div>
  
</section>

</html>
