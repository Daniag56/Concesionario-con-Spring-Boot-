<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="layout :: layout(~{::section})">

<section>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        .page-wrapper {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding-top: 20px;
            padding-bottom: 40px;
        }

        .dashboard-title {
            font-weight: 700;
            font-size: 2.2rem;
        }

        .cards-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            max-width: 1100px;
        }

        .card-modern {
            width: 200px;
            min-height: 160px;
            border-radius: 12px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.78);
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 14px rgba(0,0,0,0.10);
            transition: 0.2s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
        }

        .card-modern:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 22px rgba(0,0,0,0.15);
        }

        .card-title {
            font-weight: 600;
            font-size: 1rem;
            margin: 0;
            line-height: 1.2;
        }

        .value {
            font-size: 2.2rem;
            font-weight: 700;
            line-height: 1;
            margin: 10px 0;
        }

        .btn-consultar {
            padding: 8px 14px;
            font-size: 0.8rem;
            border-radius: 8px;
            font-weight: 600;
            transition: 0.2s ease;
            text-decoration: none;
            border: 1.5px solid #0d6efd;
            color: #0d6efd;
            background: transparent;
            white-space: nowrap;
        }

        .btn-consultar:hover {
            background: #0d6efd;
            color: #fff;
            transform: translateY(-2px);
        }

        #toggleChart {
            font-weight: 600;
            border-radius: 8px;
            padding: 10px 20px;
            transition: 0.2s ease;
        }

        #toggleChart:hover {
            transform: translateY(-2px);
        }

        #chartContainer {
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.78);
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 14px rgba(0,0,0,0.10);
        }

        .user-header-bar {
            width: 100%;
            max-width: 1100px;
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .user-info {
            position: relative;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            padding: 10px 16px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(102, 126, 234, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .user-info:hover {
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.2);
            border-color: rgba(102, 126, 234, 0.4);
        }

        .user-avatar {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1rem;
        }

        .user-details {
            display: flex;
            flex-direction: column;
            line-height: 1.2;
        }

        .user-label {
            font-size: 0.7rem;
            color: #6c757d;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .user-email {
            font-size: 0.9rem;
            font-weight: 600;
            color: #212529;
            max-width: 150px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-menu-btn {
            background: none;
            border: none;
            color: #6c757d;
            padding: 4px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .user-info.show-dropdown .user-menu-btn {
            transform: rotate(180deg);
        }

        .user-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 8px;
            min-width: 180px;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            list-style: none;
            padding: 8px 0;
            margin: 0;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .user-info.show-dropdown .user-dropdown {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            color: #495057;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .dropdown-link:hover {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.08) 0%, rgba(118, 75, 162, 0.08) 100%);
            color: #667eea;
        }

        .dropdown-line {
            margin: 4px 0;
            border: none;
            border-top: 1px solid rgba(0, 0, 0, 0.08);
        }

        .logout-link {
            color: #dc3545;
        }

        .logout-link:hover {
            background: rgba(220, 53, 69, 0.08);
            color: #dc3545;
        }

        @media (max-width: 576px) {
            .user-email {
                display: none;
            }
            .user-details {
                display: none;
            }
            .user-info {
                padding: 8px 12px;
            }
        }
    </style>

    <div class="page-wrapper">

        <div class="user-header-bar" th:if="${session['usuario'] != null}">
            <div class="user-info">
                <div class="user-avatar">
                    <i class="bi bi-person-fill"></i>
                </div>
                <div class="user-details">
                    <span class="user-label">Conectado como</span>
                    <span class="user-email" th:text="${session['usuario'].email}">Usuario</span>
                </div>
                <button class="user-menu-btn" data-bs-toggle="dropdown" aria-expanded="false">
                    <i class="bi bi-chevron-down"></i>
                </button>
                <ul class="user-dropdown">
                    <li><a class="dropdown-link" href="#"><i class="bi bi-person"></i> Mi cuenta</a></li>
                    <li><hr class="dropdown-line"></li>
                    <li><a class="dropdown-link logout-link" th:href="@{/logout}"><i class="bi bi-box-arrow-right"></i> Cerrar sesión</a></li>
                </ul>
            </div>
        </div>

        <h1 class="dashboard-title mb-2">📊 Panel de Control</h1>
        <p class="text-muted mb-4">Resumen general del concesionario</p>

        <div class="cards-container">

            <!-- MARCAS -->
            <div class="card-modern">
                <div class="card-title">🏷️ Marcas</div>
                <div id="marcas" class="value">–</div>
                <a href="/marcas/lista" class="btn-consultar">🔍 Consultar tabla</a>
            </div>

            <!-- MODELOS -->
            <div class="card-modern">
                <div class="card-title">🚗 Modelos</div>
                <div id="modelos" class="value">–</div>
                <a href="/modelos/lista" class="btn-consultar">🔍 Consultar tabla</a>
            </div>

            <!-- CONCESIONARIOS -->
            <div class="card-modern">
                <div class="card-title">🏢 Concesionarios</div>
                <div id="concesionarios" class="value">–</div>
                <a href="/concesionarios/lista" class="btn-consultar">🔍 Consultar tabla</a>
            </div>

            <!-- EXTRAS -->
            <div class="card-modern">
                <div class="card-title">⭐ Extras</div>
                <div id="extras" class="value">–</div>
                <a href="/extras/lista" class="btn-consultar">🔍 Consultar tabla</a>
            </div>

            <!-- VEHÍCULOS -->
            <div class="card-modern">
                <div class="card-title">🚙 Vehículos</div>
                <div id="vehiculos" class="value">–</div>
                <a href="/vehiculos/lista" class="btn-consultar">🔍 Consultar tabla</a>
            </div>

        </div>

        <button id="toggleChart" class="btn btn-outline-dark mt-4 mb-2">
            Ocultar gráfico de contenido
        </button>

        <div class="card-modern p-4 d-block" id="chartContainer" style="width:500px;">
            <h4 class="mb-3">Distribución General</h4>
            <canvas id="chartResumen" height="140"></canvas>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        fetch("/api/dashboard/resumen")
            .then(r => r.json())
            .then(data => {
                document.getElementById("marcas").textContent        = data.marcas;
                document.getElementById("modelos").textContent       = data.modelos;
                document.getElementById("concesionarios").textContent= data.concesionarios;
                document.getElementById("extras").textContent        = data.extras;
                document.getElementById("vehiculos").textContent     = data.vehiculos;

                new Chart(document.getElementById("chartResumen"), {
                    type: "bar",
                    data: {
                        labels: ["Marcas", "Modelos", "Concesionarios", "Extras", "Vehículos"],
                        datasets: [{
                            label: "Cantidad",
                            data: [data.marcas, data.modelos, data.concesionarios, data.extras, data.vehiculos],
                            backgroundColor: [
                                "rgba(13,110,253,0.7)",
                                "rgba(25,135,84,0.7)",
                                "rgba(255,193,7,0.7)",
                                "rgba(220,53,69,0.7)",
                                "rgba(13,202,240,0.7)"
                            ],
                            borderRadius: 10
                        }]
                    },
                    options: {
                        plugins: { legend: { display: false } },
                        scales: { y: { beginAtZero: true } }
                    }
                });
            });

        const chartContainer = document.getElementById("chartContainer");
        const toggleBtn = document.getElementById("toggleChart");
        let visible = true;

        toggleBtn.addEventListener("click", () => {
            visible = !visible;
            chartContainer.style.display = visible ? "block" : "none";
            toggleBtn.textContent = visible
                ? "Ocultar gráfico de contenido"
                : "Mostrar gráfico de contenido";
        });

        const userInfo = document.querySelector('.user-info');
        if (userInfo) {
            userInfo.addEventListener('click', function(e) {
                if (e.target.closest('.dropdown-link')) return;
                this.classList.toggle('show-dropdown');
            });
            document.addEventListener('click', function(e) {
                if (!userInfo.contains(e.target)) {
                    userInfo.classList.remove('show-dropdown');
                }
            });
        }
    </script>

</section>
</html>
