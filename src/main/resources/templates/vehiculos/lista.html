<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" 
      th:replace="layout :: layout(~{::section})">

<section>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    .page-wrapper { padding: 40px; display: flex; flex-direction: column; align-items: center; max-width: 100%; margin: 0 auto; box-sizing: border-box; }
  .table-card { width: 100%; max-width: 1100px; background: rgba(255,255,255,0.78); backdrop-filter: blur(12px); padding: 25px; border-radius: 14px; box-shadow: 0 4px 14px rgba(0,0,0,0.12); }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
    h2 { font-weight: 700; margin: 0; }

    @media (max-width: 992px) {
      .table-card { width: 100%; padding: 20px; }
      table { font-size: 0.9rem; }
      th, td { padding: 10px 8px; }
    }
    @media (max-width: 768px) {
      .page-wrapper { padding: 20px 15px; }
      .table-card { padding: 15px; }
      .top-bar { flex-direction: column; align-items: flex-start; }
      table { font-size: 0.85rem; }
      th, td { padding: 8px 6px; }
    }
    @media (max-width: 576px) {
      .page-wrapper { padding: 15px 10px; }
      table, thead, tbody, th, td, tr { display: block; }
      thead { display: none; }
      tr { margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; padding: 10px; }
      td { padding: 8px; border: none; }
      td::before { content: attr(data-label); font-weight: 600; display: block; color: #666; font-size: 0.75rem; text-transform: uppercase; }
    }
    .btn-accion { padding: 7px 14px; font-size: 0.85rem; border-radius: 8px; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; transition: 0.2s ease; text-decoration: none; border: 1.5px solid; }
    .btn-accion:hover { transform: translateY(-2px); opacity: 0.9; }
    .btn-nuevo  { border-color: #198754; color: #198754; }
    .btn-nuevo:hover  { background: #198754; color: #fff; }
    .btn-editar { border-color: #ffc107; color: #856404; }
    .btn-editar:hover { background: #ffc107; color: #000; }
    .btn-volver { border-color: #6c757d; color: #6c757d; }
    .btn-volver:hover { background: #6c757d; color: #fff; }
    .btn-eliminar { background: none; border: 1.5px solid #dc3545; color: #dc3545; padding: 7px 14px; font-size: 0.85rem; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s ease; display: inline-flex; align-items: center; gap: 6px; }
    .btn-eliminar:hover { background: #dc3545; color: #fff; transform: translateY(-2px); }
    .form-eliminar { display: inline; margin: 0; padding: 0; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { padding: 12px; border-bottom: 1px solid #ddd; }
    th { font-weight: 700; background: #f8f9fa; }
    .acciones { display: flex; gap: 8px; align-items: center; }
  </style>

  <div class="page-wrapper">
    <div class="table-card">

      <div class="top-bar">
        <h2>🚙 Vehículos</h2>
        <div style="display:flex; gap:10px;">
          <a href="/vehiculos/crear" class="btn-accion btn-nuevo">➕ Nuevo Vehículo</a>
          <a href="/dashboard" class="btn-accion btn-volver">← Dashboard</a>
        </div>
      </div>

      <table>
        <thead>
        <tr>
          <th>ID</th>
          <th>Código</th>
          <th>VIN</th>
          <th>Matrícula</th>
          <th>Modelo</th>
          <th>Concesionario</th>
          <th>Estado</th>
          <th>Combustible</th>
          <th>Km</th>
          <th>Precio (€)</th>
          <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="v : ${listaVehiculos}">
          <td th:text="${v.id}"></td>
          <td th:text="${v.codigoVehiculo}"></td>
          <td th:text="${v.vin}"></td>
          <td th:text="${v.matricula}"></td>
          <td th:text="${v.modelo != null ? v.modelo.nombre : '–'}"></td>
          <td th:text="${v.concesionario != null ? v.concesionario.nombreComercial : '–'}"></td>
          <td>
            <span th:text="${v.estado}"
                  th:classappend="${v.estado != null and v.estado.name() == 'NUEVO'} ? 'badge badge-nuevo' :
                                  (${v.estado != null and v.estado.name() == 'KM0'}  ? 'badge badge-km0'  :
                                  'badge badge-usado')">
            </span>
          </td>
          <td th:text="${v.combustible}"></td>
          <td th:text="${v.kilometraje}"></td>
          <td th:text="${v.precioVenta}"></td>
          <td>
            <div class="acciones">
              <a th:href="@{'/vehiculos/editar/' + ${v.id}}" class="btn-accion btn-editar">✏️ Editar</a>
              <form th:action="@{'/vehiculos/eliminar/' + ${v.id}}" method="post" class="form-eliminar"
                    onsubmit="return confirm('¿Eliminar este vehículo?')">
                <button type="submit" class="btn-eliminar">🗑️ Eliminar</button>
              </form>
            </div>
          </td>
        </tr>
        </tbody>
      </table>

    </div>
  </div>

</section>
</html>
