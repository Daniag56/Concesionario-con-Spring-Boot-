<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo} ?: 'Concesionario'">Concesionario</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body { background: #f5f6fa; font-family: 'Poppins', sans-serif; }
        .navbar-brand { font-weight: 700; }
        .content { padding: 30px; width: 100%; margin: 0 auto; box-sizing: border-box; }
        .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-weight: 500; }
        .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }

        @media (max-width: 768px) {
            .content { padding: 0 8px; }
            .table-card, .form-card { width: 100% !important; max-width: 100% !important; }
            .top-bar { flex-direction: column; align-items: flex-start; }
        }
        /* Ensure full-bleed responsiveness for all content (except login handled separately) */
        .content.container { width: 100% !important; max-width: 100% !important; padding-left: 0; padding-right: 0; margin-left: 0; margin-right: 0; }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/dashboard}">Concesionario</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/dashboard}">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/marcas/lista}">Marcas</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/modelos/lista}">Modelos</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/concesionarios/lista}">Concesionarios</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/extras/lista}">Extras</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/vehiculos/lista}">Vehículos</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="content" th:fragment="layout(content)">
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:replace="${content}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
